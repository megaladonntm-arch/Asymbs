services:
  - type: web
    name: anon-messenger-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: MESSAGE_TTL_SECONDS
        value: "3600"
      - key: FILE_TTL_SECONDS
        value: "3600"
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
      - key: CLEANUP_INTERVAL_SECONDS
        value: "300"
      # For production use a managed Postgres and set DATABASE_URL here.
      # - key: DATABASE_URL
      #   value: "postgresql+psycopg2://user:pass@host:5432/db"
