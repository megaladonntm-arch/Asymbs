[build]
  base = "frontend"
  command = "sh ./netlify-build.sh"
  publish = "dist"

[build.environment]
  VITE_API_BASE = "https://asymbs-production.up.railway.app"
  VITE_WS_BASE = "wss://asymbs-production.up.railway.app"
  NODE_VERSION = "20.11.1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
