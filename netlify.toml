[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_BASE = "https://YOUR-RENDER-URL.onrender.com"
  VITE_WS_BASE = "wss://YOUR-RENDER-URL.onrender.com"
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200